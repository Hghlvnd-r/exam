{% extends "base.html" %}
{% block content %}
<h1 class="h4 mb-3 text-center">Вход в систему</h1>
<p class="text-muted small text-center mb-4">
    Войдите под своей учётной записью пользователя или используйте<br>
    логин <code>Admin26</code> и пароль <code>Demo20.</code> для доступа к панели администратора.
</p>

<form method="post" novalidate>
    <div class="mb-3">
        <label class="form-label">Логин</label>
        <input type="text" name="login" class="form-control" required
            value="{{ login or '' }}" placeholder="Ваш логин">
    </div>
    <div class="mb-3">
        <label class="form-label">Пароль</label>
        <input type="password" name="password" class="form-control" required
            placeholder="Ваш пароль">
    </div>
    <div class="d-flex justify-content-between align-items-center mt-4">
        <a href="{{ url_for('register') }}" class="small link-secondary">
            Ещё не зарегистрированы? Регистрация
        </a>
        <button type="submit" class="btn btn-primary">
            Войти
        </button>
    </div>
</form>
{% endblock %}
